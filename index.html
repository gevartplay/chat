<!DOCTYPE html>
<html lang="ru" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лёгкий Чат | Секретные файлы</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #8b5cf6; border-radius: 10px; }
        body, div, input, textarea, button { transition: background-color 0.3s, color 0.3s, border-color 0.3s; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #8b5cf6; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-100 dark:bg-gray-900 h-screen flex items-center justify-center p-4 font-sans text-gray-800 dark:text-gray-200">

    <!-- Кнопка темы -->
    <button id="theme-btn" class="absolute top-4 right-4 bg-white dark:bg-gray-800 p-3 rounded-full shadow-lg border border-gray-200 dark:border-gray-700 text-xl z-50 transition hover:scale-110">
        🌙
    </button>

    <!-- ЭКРАН ВХОДА -->
    <div id="login-screen" class="bg-white dark:bg-gray-800 p-8 rounded-2xl shadow-xl w-full max-w-sm border border-gray-100 dark:border-gray-700 flex flex-col items-center">
        <h1 class="text-3xl font-extrabold text-violet-600 dark:text-violet-400 mb-1">Вход в Чат</h1>
        <p class="text-sm text-gray-500 dark:text-gray-400 mb-8">Отправляй самоуничтожающиеся файлы</p>
        
        <form id="login-form" class="space-y-5 w-full">
            <div class="text-center">
                <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-2">Ваш никнейм</label>
                <input type="text" id="nickname" required placeholder="Например: Алекс" class="w-full px-4 py-3 text-center rounded-xl bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 focus:border-violet-500 outline-none">
            </div>

            <div class="text-center">
                <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-2">Название комнаты</label>
                <input type="text" id="room" required placeholder="Например: room-123" class="w-full px-4 py-3 text-center rounded-xl bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 focus:border-violet-500 outline-none">
            </div>

            <div class="flex items-center justify-center gap-2 bg-violet-50 dark:bg-gray-700 p-3 rounded-xl border border-violet-100 dark:border-gray-600 cursor-pointer mt-2" onclick="document.getElementById('is-creator').click()">
                <input type="checkbox" id="is-creator" class="w-5 h-5 accent-violet-600 cursor-pointer">
                <label class="text-sm font-semibold text-violet-900 dark:text-violet-300 cursor-pointer select-none">Я создатель (смогу удалить чат)</label>
            </div>

            <button type="submit" class="w-full bg-violet-600 hover:bg-violet-700 text-white font-bold py-3 rounded-xl shadow-lg mt-4 transition">
                Войти
            </button>
        </form>
    </div>

    <!-- ЭКРАН ЧАТА -->
    <div id="chat-screen" class="hidden w-full max-w-4xl h-full max-h-[850px] bg-white dark:bg-gray-800 rounded-2xl shadow-2xl flex-col overflow-hidden relative border border-gray-200 dark:border-gray-700">
        
        <!-- Шапка -->
        <div class="bg-violet-600 dark:bg-violet-800 px-6 py-4 flex justify-between items-center text-white shadow-md z-10">
            <div>
                <h2 id="room-name-display" class="font-bold text-xl tracking-wide">Комната</h2>
                <p class="text-violet-200 text-xs flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></span> В сети</p>
            </div>
            <div class="flex gap-2">
                <button id="delete-room-btn" class="hidden bg-red-500 hover:bg-red-600 px-3 py-2 rounded-lg text-sm font-bold shadow">Удалить чат</button>
                <button id="logout-btn" class="bg-violet-800 hover:bg-violet-900 px-4 py-2 rounded-lg text-sm font-bold">Выйти</button>
            </div>
        </div>

        <!-- Сообщения -->
        <div id="messages" class="flex-1 p-4 md:p-6 overflow-y-auto bg-gray-50 dark:bg-gray-900 flex flex-col gap-4">
            <div class="text-center text-xs text-gray-400 dark:text-gray-500 my-2">
                Все сообщения зашифрованы протоколом MQTT.<br>Вы можете отправлять файлы до 100 МБ.
            </div>
        </div>

        <!-- Ввод -->
        <div class="p-4 bg-white dark:bg-gray-800 border-t border-gray-200 dark:border-gray-700">
            
            <!-- Блок предпросмотра выбранного файла -->
            <div id="file-preview-container" class="hidden mb-3 p-3 bg-violet-50 dark:bg-gray-700 rounded-xl flex flex-col gap-2 border border-violet-100 dark:border-gray-600">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-2 overflow-hidden">
                        <span class="text-xl">📎</span>
                        <span id="file-preview-name" class="text-sm font-bold text-violet-800 dark:text-violet-200 truncate max-w-[200px]">Файл.jpg</span>
                    </div>
                    <button type="button" id="cancel-file-btn" class="text-red-500 font-bold hover:text-red-700 px-2 text-xl">×</button>
                </div>
                
                <!-- Галочка самоуничтожения -->
                <label class="flex items-center gap-2 cursor-pointer bg-white dark:bg-gray-800 p-2 rounded-lg border border-gray-200 dark:border-gray-600 w-max">
                    <input type="checkbox" id="onetime-checkbox" class="w-4 h-4 accent-violet-600 cursor-pointer">
                    <span class="text-xs font-bold text-red-500">🔥 Удалить после 1 скачивания</span>
                </label>
            </div>

            <form id="chat-form" class="flex gap-2 items-end">
                <label class="cursor-pointer bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 p-3 rounded-xl text-xl shadow-sm border border-gray-200 dark:border-gray-600 flex-shrink-0 transition">
                    📎
                    <input type="file" id="file-input" class="hidden">
                </label>

                <textarea id="msg-input" rows="1" placeholder="Введите сообщение..." class="flex-1 px-4 py-3 bg-gray-50 dark:bg-gray-700 rounded-xl border border-gray-200 dark:border-gray-600 focus:border-violet-500 outline-none resize-none text-gray-800 dark:text-gray-100"></textarea>
                
                <button type="submit" id="send-btn" class="bg-violet-600 hover:bg-violet-700 text-white w-14 h-12 rounded-xl flex items-center justify-center shadow-md flex-shrink-0 transition">
                    <span id="send-icon">➤</span>
                    <span id="send-loader" class="loader hidden"></span>
                </button>
            </form>
        </div>
    </div>

    <!-- JAVASCRIPT ЛОГИКА -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {

            // ТЕМНАЯ ТЕМА
            const themeBtn = document.getElementById('theme-btn');
            function applyTheme() {
                const isDark = localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches);
                if (isDark) {
                    document.documentElement.classList.add('dark');
                    themeBtn.innerText = '☀️';
                } else {
                    document.documentElement.classList.remove('dark');
                    themeBtn.innerText = '🌙';
                }
            }
            themeBtn.addEventListener('click', () => {
                const isDark = document.documentElement.classList.contains('dark');
                localStorage.setItem('theme', isDark ? 'light' : 'dark');
                applyTheme();
            });
            applyTheme();

            // ПЕРЕМЕННЫЕ ЧАТА
            let myNick = '';
            let currentRoom = '';
            let isCreator = false;
            let client = null;
            let chatHistory = [];
            let selectedFile = null;

            // ЭЛЕМЕНТЫ
            const loginScreen = document.getElementById('login-screen');
            const chatScreen = document.getElementById('chat-screen');
            const loginForm = document.getElementById('login-form');
            const chatForm = document.getElementById('chat-form');
            const messagesDiv = document.getElementById('messages');
            const msgInput = document.getElementById('msg-input');
            const fileInput = document.getElementById('file-input');
            const filePreviewContainer = document.getElementById('file-preview-container');
            const filePreviewName = document.getElementById('file-preview-name');
            const cancelFileBtn = document.getElementById('cancel-file-btn');
            const onetimeCheckbox = document.getElementById('onetime-checkbox');
            const sendBtn = document.getElementById('send-btn');
            const sendIcon = document.getElementById('send-icon');
            const sendLoader = document.getElementById('send-loader');
            const deleteRoomBtn = document.getElementById('delete-room-btn');
            const logoutBtn = document.getElementById('logout-btn');

            // ВХОД В КОМНАТУ
            loginForm.addEventListener('submit', (e) => {
                e.preventDefault();
                myNick = document.getElementById('nickname').value.trim();
                currentRoom = document.getElementById('room').value.trim();
                isCreator = document.getElementById('is-creator').checked;

                if (myNick && currentRoom) {
                    startChat();
                }
            });

            // ВЫХОД
            logoutBtn.addEventListener('click', () => location.reload());

            // ЗАПУСК ЧАТА
            function startChat() {
                loginScreen.classList.add('hidden');
                chatScreen.classList.remove('hidden');
                chatScreen.classList.add('flex');
                document.getElementById('room-name-display').innerText = currentRoom;

                if (isCreator) {
                    deleteRoomBtn.classList.remove('hidden');
                }

                const saved = localStorage.getItem('my_chat_' + currentRoom);
                if (saved) {
                    try {
                        chatHistory = JSON.parse(saved);
                        chatHistory.forEach(renderMessage);
                    } catch(e) {}
                }

                client = mqtt.connect('wss://broker.emqx.io:8084/mqtt');
                const topic = 'super-chat-secure/' + currentRoom;

                client.on('connect', () => {
                    client.subscribe(topic);
                    client.publish(topic, JSON.stringify({ type: 'join', sender: myNick }));
                });

                client.on('message', (topic, message) => {
                    try {
                        const data = JSON.parse(message.toString());
                        if (data.type === 'chat') {
                            chatHistory.push(data);
                            saveHistory();
                            renderMessage(data);
                        } 
                        else if (data.type === 'join' && isCreator) {
                            client.publish(topic, JSON.stringify({ type: 'sync', history: chatHistory }));
                        } 
                        else if (data.type === 'sync' && !isCreator) {
                            if (data.history.length > chatHistory.length) {
                                chatHistory = data.history;
                                saveHistory();
                                messagesDiv.innerHTML = '';
                                chatHistory.forEach(renderMessage);
                            }
                        } 
                        else if (data.type === 'delete') {
                            localStorage.removeItem('my_chat_' + currentRoom);
                            messagesDiv.innerHTML = `<div class="bg-red-100 text-red-700 p-4 rounded-xl text-center font-bold mt-10">Создатель навсегда удалил чат.</div>`;
                            setTimeout(() => location.reload(), 3000);
                        }
                    } catch (e) { console.error("Ошибка сообщения"); }
                });
            }

            // ВЫБОР ФАЙЛА (Только предпросмотр, загрузка будет при нажатии "Отправить")
            fileInput.addEventListener('change', (event) => {
                const file = event.target.files[0];
                if (!file) return;

                if (file.size > 100 * 1024 * 1024) {
                    alert("Файл слишком большой! Максимум 100 МБ.");
                    fileInput.value = "";
                    return;
                }

                selectedFile = file;
                filePreviewName.innerText = file.name;
                filePreviewContainer.classList.remove('hidden');
                onetimeCheckbox.checked = false; // Сбрасываем галочку
            });

            // ОТМЕНА ФАЙЛА
            cancelFileBtn.addEventListener('click', clearFile);

            function clearFile() {
                selectedFile = null;
                fileInput.value = "";
                filePreviewContainer.classList.add('hidden');
            }

            // ФУНКЦИЯ ЗАГРУЗКИ ФАЙЛА В ОБЛАКО
            async function uploadFileToCloud(file, isOneTime) {
                const formData = new FormData();
                formData.append('file', file);

                if (isOneTime) {
                    // Используем file.io для одноразовых файлов (Удаляется после 1 скачивания)
                    const res = await fetch('https://file.io', { method: 'POST', body: formData });
                    if (!res.ok) throw new Error("Ошибка file.io");
                    const json = await res.json();
                    return json.link;
                } else {
                    // Используем tmpfiles.org для обычных файлов (Хранится дольше, надежный API)
                    const res = await fetch('https://tmpfiles.org/api/v1/upload', { method: 'POST', body: formData });
                    if (!res.ok) throw new Error("Ошибка tmpfiles.org");
                    const json = await res.json();
                    // tmpfiles отдает ссылку на страницу, меняем URL для прямого скачивания/просмотра
                    return json.data.url.replace('tmpfiles.org/', 'tmpfiles.org/dl/');
                }
            }

            // ОТПРАВКА СООБЩЕНИЯ (Текст + Возможная загрузка файла)
            chatForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const text = msgInput.value.trim();

                if (!text && !selectedFile) return;

                let uploadedFileData = null;
                const isOneTime = onetimeCheckbox.checked;

                // Блокируем кнопку на время загрузки
                sendBtn.disabled = true;
                sendIcon.classList.add('hidden');
                sendLoader.classList.remove('hidden');
                msgInput.disabled = true;

                try {
                    // Если выбран файл - сначала грузим его
                    if (selectedFile) {
                        const fileUrl = await uploadFileToCloud(selectedFile, isOneTime);
                        uploadedFileData = {
                            name: selectedFile.name,
                            type: selectedFile.type || 'application/octet-stream',
                            url: fileUrl,
                            onetime: isOneTime
                        };
                    }

                    // Формируем и отправляем сообщение
                    const msgData = {
                        type: 'chat',
                        sender: myNick,
                        text: text,
                        file: uploadedFileData,
                        time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                    };

                    client.publish('super-chat-secure/' + currentRoom, JSON.stringify(msgData));
                    
                    msgInput.value = '';
                    clearFile();
                } catch (err) {
                    alert("❌ Ошибка при отправке файла. Проверьте подключение к интернету или попробуйте другой файл.\nДетали: " + err.message);
                } finally {
                    // Разблокируем интерфейс
                    sendBtn.disabled = false;
                    sendIcon.classList.remove('hidden');
                    sendLoader.classList.add('hidden');
                    msgInput.disabled = false;
                    msgInput.focus();
                }
            });

            // УДАЛЕНИЕ КОМНАТЫ
            deleteRoomBtn.addEventListener('click', () => {
                if (confirm("Вы уверены? Чат удалится у всех навсегда.")) {
                    client.publish('super-chat-secure/' + currentRoom, JSON.stringify({ type: 'delete' }));
                }
            });

            // ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ
            function saveHistory() {
                try {
                    localStorage.setItem('my_chat_' + currentRoom, JSON.stringify(chatHistory));
                } catch(e) {
                    chatHistory = chatHistory.slice(-20);
                    localStorage.setItem('my_chat_' + currentRoom, JSON.stringify(chatHistory));
                }
            }

            function renderMessage(msg) {
                const isMe = msg.sender === myNick;
                const wrapper = document.createElement('div');
                wrapper.className = `flex w-full ${isMe ? 'justify-end' : 'justify-start'}`;

                let fileHtml = '';
                if (msg.file && msg.file.url) {
                    const isImage = msg.file.type.startsWith('image/');
                    
                    // Плашка, если файл самоуничтожающийся
                    const onetimeBadge = msg.file.onetime 
                        ? `<div class="bg-red-500 text-white text-[10px] uppercase font-bold px-2 py-1 rounded-md mb-2 text-center shadow-sm animate-pulse">🔥 Удалится после скачивания</div>` 
                        : '';

                    if (isImage && !msg.file.onetime) {
                        // Картинки (если они не одноразовые, можно показать превью)
                        fileHtml = `
                            ${onetimeBadge}
                            <div class="mb-2 p-1 rounded-xl bg-black/5 dark:bg-black/20">
                                <img src="${msg.file.url}" class="rounded-lg max-h-64 object-contain">
                                <a href="${msg.file.url}" target="_blank" class="block mt-2 text-center bg-violet-500/20 hover:bg-violet-500/40 text-violet-900 dark:text-violet-100 text-xs font-bold py-2 rounded-lg transition">🔍 Открыть / Скачать</a>
                            </div>`;
                    } else {
                        // Обычные файлы (или одноразовые картинки - их безопаснее качать кнопкой)
                        fileHtml = `
                            ${onetimeBadge}
                            <div class="mb-2 bg-black/10 dark:bg-black/30 p-3 rounded-xl flex flex-col items-center gap-2 text-center">
                                <div class="text-3xl">📄</div>
                                <div class="text-sm font-bold truncate max-w-[150px]">${msg.file.name}</div>
                                <a href="${msg.file.url}" target="_blank" class="bg-violet-700 hover:bg-violet-800 text-white text-xs py-2 px-6 rounded-lg transition w-full">⬇️ Скачать файл</a>
                            </div>`;
                    }
                }

                let textHtml = msg.text ? `<div class="text-[15px] leading-relaxed break-words whitespace-pre-wrap">${msg.text}</div>` : '';

                wrapper.innerHTML = `
                    <div class="max-w-[85%] sm:max-w-[75%] px-4 py-3 shadow-sm relative ${isMe ? 'bg-violet-600 text-white rounded-2xl rounded-br-none' : 'bg-white dark:bg-gray-800 text-gray-800 dark:text-gray-100 rounded-2xl rounded-bl-none border border-gray-200 dark:border-gray-700'}">
                        ${!isMe ? `<div class="text-xs font-bold text-violet-500 dark:text-violet-400 mb-2">${msg.sender}</div>` : ''}
                        ${fileHtml}
                        ${textHtml}
                        <div class="text-[10px] mt-2 opacity-70 text-right font-semibold">${msg.time}</div>
                    </div>
                `;

                messagesDiv.appendChild(wrapper);
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            }

            // Отправка по Enter
            msgInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    if(!sendBtn.disabled) document.getElementById('send-btn').click();
                }
            });

        });
    </script>
</body>
</html>
