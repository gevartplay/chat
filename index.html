<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Clone MVP</title>
    <!-- Подключаем React, Tailwind, Babel и Socket.io -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-100 h-screen overflow-hidden text-gray-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const SERVER_URL = 'http://localhost:3000';
        let socket;

        function App() {
            const [username, setUsername] = useState(localStorage.getItem('username') || '');
            const [isLoggedIn, setIsLoggedIn] = useState(!!localStorage.getItem('username'));
            const [messages, setMessages] = useState([]);
            const [onlineUsers, setOnlineUsers] = useState([]);
            const [input, setInput] = useState('');
            const [file, setFile] = useState(null);
            const [showEmojis, setShowEmojis] = useState(false);
            const messagesEndRef = useRef(null);
            
            const EMOJIS = ['😀','😂','🥰','😎','🤔','👍','❤️','🔥','🎉','✨'];

            useEffect(() => {
                if (!isLoggedIn) return;

                // Подключаемся к сокетам после логина
                socket = io(SERVER_URL);
                socket.emit('userJoin', username);

                // Загружаем историю
                fetch(`${SERVER_URL}/api/messages`)
                    .then(res => res.json())
                    .then(data => setMessages(data))
                    .catch(err => console.error("Ошибка загрузки. Бэкенд запущен?", err));

                socket.on('receiveMessage', (msg) => setMessages(prev => [...prev, msg]));
                socket.on('onlineUsers', (users) => setOnlineUsers(users));

                return () => socket.disconnect();
            }, [isLoggedIn, username]);

            useEffect(() => {
                messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            }, [messages]);

            const handleLogin = async (e) => {
                e.preventDefault();
                const name = e.target.username.value.trim();
                if (!name) return;

                try {
                    await fetch(`${SERVER_URL}/api/login`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username: name })
                    });
                    localStorage.setItem('username', name);
                    setUsername(name);
                    setIsLoggedIn(true);
                } catch (err) {
                    alert("Ошибка: Сервер не запущен на http://localhost:3000");
                }
            };

            const handleSend = async (e) => {
                e.preventDefault();
                if (!input.trim() && !file) return;

                let fileUrl = null, fileName = null, fileType = null;

                if (file) {
                    const formData = new FormData();
                    formData.append('file', file);
                    try {
                        const res = await fetch(`${SERVER_URL}/api/upload`, { method: 'POST', body: formData });
                        if (!res.ok) throw new Error("File too large or invalid");
                        const data = await res.json();
                        fileUrl = data.fileUrl;
                        fileName = data.fileName;
                        fileType = file.type;
                    } catch (err) {
                        return alert("Ошибка загрузки файла. Допустимы изображения/видео/PDF до 10MB.");
                    }
                }

                socket.emit('sendMessage', { sender: username, text: input, fileUrl, fileName, fileType });
                setInput('');
                setFile(null);
                setShowEmojis(false);
            };

            if (!isLoggedIn) {
                return (
                    <div className="flex h-screen items-center justify-center bg-blue-50">
                        <form onSubmit={handleLogin} className="bg-white p-8 rounded-xl shadow-lg w-96 text-center">
                            <div className="w-16 h-16 bg-blue-500 rounded-full flex items-center justify-center mx-auto mb-4 shadow-md">
                                <svg className="w-8 h-8 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                            </div>
                            <h1 className="text-2xl font-bold mb-6 text-gray-800">Вход в Чат</h1>
                            <input type="text" name="username" placeholder="Придумайте никнейм..." className="w-full p-3 border rounded-lg mb-4 focus:ring-2 focus:ring-blue-400 outline-none" required />
                            <button type="submit" className="w-full bg-blue-500 text-white p-3 rounded-lg hover:bg-blue-600 transition font-semibold">Войти</button>
                        </form>
                    </div>
                );
            }

            return (
                <div className="flex h-screen bg-gray-100">
                    {/* Sidebar */}
                    <div className="w-64 bg-white border-r hidden md:flex flex-col">
                        <div className="p-4 border-b bg-gray-50">
                            <h2 className="font-semibold text-lg">{username}</h2>
                            <p className="text-xs text-green-500">В сети</p>
                        </div>
                        <div className="p-3 bg-blue-50 cursor-pointer border-l-4 border-blue-500">
                            <div className="font-semibold text-gray-800">Общий чат</div>
                            <div className="text-sm text-gray-500">Онлайн: {onlineUsers.length}</div>
                        </div>
                        <div className="mt-auto p-4 text-xs text-gray-400">
                            * Файлы удаляются через 10 минут
                        </div>
                    </div>

                    {/* Chat Area */}
                    <div className="flex-1 flex flex-col relative">
                        <div className="p-4 bg-white border-b shadow-sm flex items-center justify-between z-10">
                            <div>
                                <h2 className="font-bold text-lg">Общий чат</h2>
                                <p className="text-xs text-blue-500">{onlineUsers.join(', ')}</p>
                            </div>
                            <button onClick={() => { localStorage.clear(); window.location.reload(); }} className="text-red-500 text-sm hover:underline">Выйти</button>
                        </div>

                        {/* Messages */}
                        <div className="flex-1 overflow-y-auto p-4 space-y-3 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')]">
                            {messages.map((msg, i) => {
                                const isMe = msg.sender === username;
                                return (
                                    <div key={i} className={`flex ${isMe ? 'justify-end' : 'justify-start'}`}>
                                        <div className={`max-w-[75%] p-3 rounded-xl shadow-sm break-words ${isMe ? 'bg-blue-100 rounded-br-none' : 'bg-white border rounded-bl-none'}`}>
                                            {!isMe && <div className="text-xs font-bold text-blue-500 mb-1">{msg.sender}</div>}
                                            
                                            {msg.fileUrl && (
                                                <div className="mb-2">
                                                    {msg.fileType?.includes('image') ? (
                                                        <img src={msg.fileUrl} className="rounded-lg max-h-60" alt="img" />
                                                    ) : msg.fileType?.includes('video') ? (
                                                        <video src={msg.fileUrl} controls className="rounded-lg max-h-60" />
                                                    ) : (
                                                        <a href={msg.fileUrl} target="_blank" className="text-blue-600 underline text-sm flex items-center gap-1">
                                                            📄 {msg.fileName}
                                                        </a>
                                                    )}
                                                </div>
                                            )}
                                            {msg.text && <div className="text-sm">{msg.text}</div>}
                                            <div className={`text-[10px] text-right mt-1 ${isMe ? 'text-blue-500' : 'text-gray-400'}`}>
                                                {new Date(msg.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}
                                            </div>
                                        </div>
                                    </div>
                                );
                            })}
                            <div ref={messagesEndRef} />
                        </div>

                        {/* Input Area */}
                        {showEmojis && (
                            <div className="absolute bottom-20 left-4 bg-white border p-2 rounded-lg shadow-lg flex gap-2">
                                {EMOJIS.map(e => <span key={e} className="cursor-pointer text-xl hover:scale-125 transition" onClick={() => {setInput(prev=>prev+e); setShowEmojis(false)}}>{e}</span>)}
                            </div>
                        )}
                        <form onSubmit={handleSend} className="p-3 bg-white flex items-center gap-2 border-t">
                            <button type="button" onClick={() => setShowEmojis(!showEmojis)} className="text-gray-400 hover:text-gray-600 text-xl">😊</button>
                            
                            <label className="cursor-pointer text-gray-400 hover:text-blue-500">
                                <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"/></svg>
                                <input type="file" className="hidden" onChange={e => setFile(e.target.files[0])} accept="image/*,video/*,.pdf,.doc,.docx" />
                            </label>
                            
                            {file && <span className="text-xs bg-blue-100 text-blue-800 px-2 py-1 rounded truncate max-w-[100px]">{file.name}</span>}
                            
                            <input type="text" value={input} onChange={e => setInput(e.target.value)} placeholder="Написать сообщение..." className="flex-1 p-2 bg-gray-100 rounded-full outline-none px-4" />
                            
                            <button type="submit" className="bg-blue-500 text-white w-10 h-10 rounded-full flex items-center justify-center hover:bg-blue-600 transition">
                                <svg className="w-5 h-5 ml-1" fill="currentColor" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                            </button>
                        </form>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
