<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лёгкий Чат</title>
    <!-- Подключаем стили Tailwind CSS для красивого дизайна -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Подключаем MQTT.js для связи без сервера -->
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        /* Скрываем скроллбар для красоты, но оставляем возможность прокрутки */
        #messages::-webkit-scrollbar { width: 6px; }
        #messages::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
    </style>
</head>
<body class="bg-slate-50 h-screen flex items-center justify-center p-4">

    <!-- ЭКРАН ВХОДА -->
    <div id="login-screen" class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md transition-all">
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-indigo-500 rounded-2xl mx-auto flex items-center justify-center mb-4 transform rotate-12">
                <svg class="w-8 h-8 text-white transform -rotate-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path></svg>
            </div>
            <h1 class="text-3xl font-bold text-slate-800">Лёгкий Чат</h1>
            <p class="text-slate-500 mt-2">Общение без границ и серверов</p>
        </div>

        <form id="login-form" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Ваш никнейм</label>
                <input type="text" id="nickname" required placeholder="Например: Алекс" class="w-full px-4 py-3 rounded-xl bg-slate-100 border-transparent focus:bg-white focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 transition outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Название комнаты</label>
                <input type="text" id="room" placeholder="Например: secret-room" value="public-room" class="w-full px-4 py-3 rounded-xl bg-slate-100 border-transparent focus:bg-white focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 transition outline-none">
                <p class="text-xs text-slate-400 mt-1">Люди с таким же названием комнаты попадут в ваш чат.</p>
            </div>
            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-xl transition shadow-lg shadow-indigo-200 mt-4">
                Войти в чат
            </button>
        </form>
    </div>

    <!-- ЭКРАН ЧАТА (Изначально скрыт) -->
    <div id="chat-screen" class="hidden w-full max-w-2xl h-full max-h-[800px] bg-white rounded-2xl shadow-xl flex-col overflow-hidden">
        
        <!-- Шапка чата -->
        <div class="bg-indigo-600 px-6 py-4 flex justify-between items-center text-white">
            <div>
                <h2 id="room-name-display" class="font-bold text-lg">Комната</h2>
                <div class="text-indigo-200 text-sm flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></span>
                    Подключено
                </div>
            </div>
            <button onclick="location.reload()" class="text-indigo-200 hover:text-white transition text-sm bg-indigo-700 px-3 py-1 rounded-lg">
                Выйти
            </button>
        </div>

        <!-- Область сообщений -->
        <div id="messages" class="flex-1 p-6 overflow-y-auto bg-slate-50 flex flex-col gap-3">
            <div class="text-center text-xs text-slate-400 my-4 bg-slate-200 inline-block px-3 py-1 rounded-full mx-auto">
                История сообщений не сохраняется. Вы видите только новые сообщения.
            </div>
        </div>

        <!-- Поле ввода -->
        <form id="chat-form" class="p-4 bg-white border-t border-slate-100 flex gap-2">
            <input type="text" id="msg-input" autocomplete="off" placeholder="Напишите сообщение..." class="flex-1 px-4 py-3 bg-slate-100 rounded-xl outline-none focus:ring-2 focus:ring-indigo-200 transition">
            <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white w-12 h-12 rounded-xl flex items-center justify-center transition shadow-md">
                <svg class="w-5 h-5 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
            </button>
        </form>
    </div>

    <!-- ЛОГИКА ЧАТА -->
    <script>
        const loginScreen = document.getElementById('login-screen');
        const chatScreen = document.getElementById('chat-screen');
        const loginForm = document.getElementById('login-form');
        const chatForm = document.getElementById('chat-form');
        const messagesDiv = document.getElementById('messages');
        const msgInput = document.getElementById('msg-input');
        const roomNameDisplay = document.getElementById('room-name-display');

        let client;
        let myNickname = '';
        let currentRoom = '';

        // Обработка входа
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            myNickname = document.getElementById('nickname').value.trim();
            currentRoom = document.getElementById('room').value.trim() || 'public-room';

            if (myNickname) {
                startChat();
            }
        });

        function startChat() {
            // Переключаем экраны
            loginScreen.classList.add('hidden');
            chatScreen.classList.remove('hidden');
            chatScreen.classList.add('flex');
            roomNameDisplay.textContent = 'Комната: ' + currentRoom;

            // Подключаемся к публичному безопасному серверу связи (бесплатно, без регистрации)
            client = mqtt.connect('wss://broker.emqx.io:8084/mqtt');

            // Уникальный канал для вашей комнаты
            const topic = 'my-custom-web-chat/' + currentRoom;

            client.on('connect', () => {
                client.subscribe(topic);
                addSystemMessage(`Вы зашли в комнату "${currentRoom}". Поделитесь названием комнаты с друзьями!`);
            });

            // Когда приходит сообщение
            client.on('message', (topic, message) => {
                const data = JSON.parse(message.toString());
                const isMe = data.nickname === myNickname;
                addMessage(data.nickname, data.text, data.time, isMe);
            });
        }

        // Отправка сообщения
        chatForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const text = msgInput.value.trim();
            
            if (text && client) {
                const topic = 'my-custom-web-chat/' + currentRoom;
                // Формируем данные сообщения
                const msgData = {
                    nickname: myNickname,
                    text: text,
                    time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                };
                
                // Отправляем всем
                client.publish(topic, JSON.stringify(msgData));
                msgInput.value = ''; // Очищаем поле
            }
        });

        // Функция отрисовки сообщения в интерфейсе
        function addMessage(sender, text, time, isMe) {
            const wrapper = document.createElement('div');
            wrapper.className = `flex flex-col w-full ${isMe ? 'items-end' : 'items-start'}`;

            const bubble = document.createElement('div');
            // Если сообщение моё - фиолетовое справа, если чужое - белое слева
            bubble.className = `max-w-[75%] px-4 py-2 rounded-2xl shadow-sm relative ${
                isMe 
                ? 'bg-indigo-600 text-white rounded-br-none' 
                : 'bg-white border border-slate-100 text-slate-800 rounded-bl-none'
            }`;

            bubble.innerHTML = `
                ${!isMe ? `<div class="text-xs font-bold text-indigo-500 mb-1">${sender}</div>` : ''}
                <div class="text-sm break-words leading-relaxed">${text}</div>
                <div class="text-[10px] mt-1 text-right ${isMe ? 'text-indigo-200' : 'text-slate-400'}">${time}</div>
            `;

            wrapper.appendChild(bubble);
            messagesDiv.appendChild(wrapper);
            
            // Прокручиваем вниз
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function addSystemMessage(text) {
            const div = document.createElement('div');
            div.className = 'text-center text-xs text-slate-500 my-2';
            div.textContent = text;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
    </script>
</body>
</html>
