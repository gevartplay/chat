<!DOCTYPE html>
<html lang="ru" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Приватный Чат</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #8b5cf6; border-radius: 10px; }
        body, div, input, textarea, button { transition: background-color 0.3s, color 0.3s, border-color 0.3s; }
        .avatar-btn.selected { border-color: #8b5cf6; background: rgba(139, 92, 246, 0.2); transform: scale(1.1); }
    </style>
</head>
<body class="bg-gray-100 dark:bg-gray-900 h-screen flex items-center justify-center p-4 font-sans text-gray-800 dark:text-gray-200">

    <!-- КНОПКА ТЕМЫ -->
    <button onclick="toggleTheme()" class="absolute top-4 right-4 bg-white dark:bg-gray-800 p-3 rounded-full shadow-lg border border-gray-200 dark:border-gray-700 text-xl z-50">
        <span id="theme-icon">🌙</span>
    </button>

    <!-- ЭКРАН ВХОДА -->
    <div id="login-screen" class="bg-white dark:bg-gray-800 p-8 rounded-2xl shadow-xl w-full max-w-md border border-gray-100 dark:border-gray-700">
        <h1 class="text-3xl font-extrabold text-center text-violet-600 dark:text-violet-400 mb-6">Вход в Чат</h1>
        
        <form id="login-form" class="space-y-5">
            <div>
                <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-2">Выберите аватарку:</label>
                <div class="flex justify-between gap-2" id="avatar-container"></div>
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1">Ваш никнейм</label>
                <input type="text" id="nickname" required placeholder="Например: Макс" class="w-full px-4 py-3 rounded-xl bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 focus:border-violet-500 outline-none">
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1">Название комнаты</label>
                <input type="text" id="room" required placeholder="Например: secret-123" class="w-full px-4 py-3 rounded-xl bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 focus:border-violet-500 outline-none">
            </div>

            <div class="flex items-center gap-2 bg-violet-50 dark:bg-gray-700 p-3 rounded-xl border border-violet-100 dark:border-gray-600 cursor-pointer" onclick="document.getElementById('is-creator').click()">
                <input type="checkbox" id="is-creator" class="w-5 h-5 accent-violet-600 cursor-pointer">
                <label class="text-sm font-semibold text-violet-900 dark:text-violet-300 cursor-pointer select-none">Я создатель (смогу удалить чат)</label>
            </div>

            <button type="submit" class="w-full bg-violet-600 hover:bg-violet-700 text-white font-bold py-3 rounded-xl shadow-lg">Войти в комнату</button>
        </form>
    </div>

    <!-- ЭКРАН ЧАТА -->
    <div id="chat-screen" class="hidden w-full max-w-4xl h-full max-h-[850px] bg-white dark:bg-gray-800 rounded-2xl shadow-2xl flex-col overflow-hidden relative border border-gray-200 dark:border-gray-700">
        
        <!-- Шапка -->
        <div class="bg-violet-600 dark:bg-violet-800 px-6 py-4 flex justify-between items-center text-white shadow-md z-10">
            <div class="flex items-center gap-3">
                <div id="my-avatar-display" class="text-3xl bg-white/20 p-1 rounded-full">🦊</div>
                <div>
                    <h2 id="room-name-display" class="font-bold text-xl tracking-wide">Комната</h2>
                    <p class="text-violet-200 text-xs flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></span> Соединение установлено</p>
                </div>
            </div>
            <div class="flex gap-2">
                <button id="delete-room-btn" class="hidden bg-red-500 hover:bg-red-600 px-3 py-2 rounded-lg text-sm font-bold shadow">🗑 Удалить</button>
                <button onclick="location.reload()" class="bg-violet-800 hover:bg-violet-900 px-3 py-2 rounded-lg text-sm font-bold">Выйти</button>
            </div>
        </div>

        <!-- Сообщения -->
        <div id="messages" class="flex-1 p-4 md:p-6 overflow-y-auto bg-gray-50 dark:bg-gray-900 flex flex-col gap-4">
            <div class="text-center text-xs text-gray-400 dark:text-gray-500 my-2">
                Все файлы загружаются в анонимное облако и удаляются через 24 часа. Макс. размер: 100 МБ.
            </div>
        </div>

        <!-- Ввод -->
        <div class="p-4 bg-white dark:bg-gray-800 border-t border-gray-200 dark:border-gray-700">
            
            <!-- Предпросмотр загрузки файла -->
            <div id="file-preview-container" class="hidden mb-3 p-3 bg-violet-50 dark:bg-gray-700 rounded-xl flex items-center justify-between border border-violet-100 dark:border-gray-600">
                <div class="flex items-center gap-2 overflow-hidden">
                    <span id="file-preview-icon" class="text-2xl animate-bounce">⏳</span>
                    <span id="file-preview-name" class="text-sm font-bold truncate text-violet-800 dark:text-violet-200">Загрузка в облако...</span>
                </div>
                <button type="button" id="cancel-file-btn" onclick="clearFile()" class="text-red-500 font-bold hover:text-red-700 px-2 text-xl hidden">×</button>
            </div>

            <form id="chat-form" class="flex gap-2 items-end">
                <label class="cursor-pointer bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 p-3 rounded-xl text-xl shadow-sm border border-gray-200 dark:border-gray-600 flex-shrink-0 transition">
                    📎
                    <input type="file" id="file-input" class="hidden" onchange="uploadFileToCloud(event)">
                </label>

                <textarea id="msg-input" rows="1" placeholder="Введите сообщение..." class="flex-1 px-4 py-3 bg-gray-50 dark:bg-gray-700 rounded-xl border border-gray-200 dark:border-gray-600 focus:border-violet-500 outline-none resize-none text-gray-800 dark:text-gray-100"></textarea>
                
                <button type="submit" id="send-btn" class="bg-violet-600 hover:bg-violet-700 text-white w-14 h-12 rounded-xl flex items-center justify-center shadow-md flex-shrink-0 transition">
                    <svg class="w-6 h-6 ml-1 transform rotate-90" fill="currentColor" viewBox="0 0 20 20"><path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z"></path></svg>
                </button>
            </form>
        </div>
    </div>

    <!-- ЛОГИКА -->
    <script>
        // --- ТЕМНАЯ ТЕМА ---
        function toggleTheme() {
            const html = document.documentElement;
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                localStorage.setItem('theme', 'light');
                document.getElementById('theme-icon').innerText = '🌙';
            } else {
                html.classList.add('dark');
                localStorage.setItem('theme', 'dark');
                document.getElementById('theme-icon').innerText = '☀️';
            }
        }
        if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
            document.getElementById('theme-icon').innerText = '☀️';
        }

        const avatars = ['🦊', '🐱', '🐼', '🐯', '🦄', '🤖', '👽', '👻'];
        let selectedAvatar = avatars[0];
        let myNick, currentRoom, isCreator, client, chatHistory = [];
        let pendingFileUrl = null;
        let pendingFileData = null;

        const avatarContainer = document.getElementById('avatar-container');
        avatars.forEach(av => {
            const btn = document.createElement('div');
            btn.className = `text-3xl cursor-pointer p-1 sm:p-2 rounded-xl border-2 border-transparent transition hover:bg-gray-100 dark:hover:bg-gray-700 ${av === selectedAvatar ? 'selected' : ''}`;
            btn.innerText = av;
            btn.onclick = () => {
                document.querySelectorAll('#avatar-container div').forEach(d => d.classList.remove('selected'));
                btn.classList.add('selected');
                selectedAvatar = av;
            };
            avatarContainer.appendChild(btn);
        });

        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            myNick = document.getElementById('nickname').value.trim();
            currentRoom = document.getElementById('room').value.trim();
            isCreator = document.getElementById('is-creator').checked;
            if (myNick && currentRoom) startChat();
        });

        function startChat() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('chat-screen').classList.replace('hidden', 'flex');
            document.getElementById('room-name-displ
